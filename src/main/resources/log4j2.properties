status = warn
name = PropertiesConfig

###################################
# Console Appender
###################################
appender.console.type = Console
appender.console.name = Console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

###################################
# File Appender
###################################
appender.file.type = File
appender.file.name = FileLogger
appender.file.fileName = logs/vTigercrm.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

###################################
# Root Logger (Console + File)
###################################
rootLogger.level = info
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.file.ref = FileLogger

###################################
# Optional: Specific package logger
###################################
logger.app.name = com.saroz.vigercrm
logger.app.level = debug
logger.app.additivity = false
logger.app.appenderRefs = console, file
logger.app.appenderRef.console.ref = Console
logger.app.appenderRef.file.ref = FileLogger
